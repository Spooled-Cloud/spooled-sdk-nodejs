name: Publish Node SDK to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm for Trusted Publishing support
        # Trusted Publishing requires npm >= 11.5.1
        run: npm install -g npm@11 # npm@11 supports Trusted Publishing (>=11.5.1) and runs on Node 20; npm@latest (12+) requires Node 22+

      - name: Install dependencies
        run: npm ci

      - name: Verify release identity
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const tag = process.env.GITHUB_REF_NAME;
          const expectedTag = 'v' + pkg.version;
          const config = fs.readFileSync('src/config.ts', 'utf8');
          const worker = fs.readFileSync('src/worker/worker.ts', 'utf8');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const runtimeVersion = config.match(/export const SDK_VERSION = '([^']+)'/)?.[1];
          const userAgentVersion = config.match(/userAgent: '@spooled\/sdk-nodejs\/([^']+)'/)?.[1];
          const versions = {
            tag: tag?.replace(/^v/, ''),
            packageJson: pkg.version,
            packageLock: lock.version,
            packageLockRoot: lock.packages?.['']?.version,
            runtimeVersion,
            userAgentVersion,
          };

          if (!/^v\d+\.\d+\.\d+$/.test(tag ?? '')) {
            console.error('Release tag must be strict vX.Y.Z, got ' + tag);
            process.exit(1);
          }
          if (tag !== expectedTag || new Set(Object.values(versions)).size !== 1) {
            console.error('Release version mismatch:', versions);
            process.exit(1);
          }
          if (!worker.includes('version: SDK_VERSION')) {
            console.error('SpooledWorker no longer derives its default version from SDK_VERSION.');
            process.exit(1);
          }
          const escaped = pkg.version.replace(/\./g, '\\.');
          if (!new RegExp('^## \\[' + escaped + '\\] - \\d{4}-\\d{2}-\\d{2}$', 'm').test(changelog)) {
            console.error('CHANGELOG.md has no dated section for ' + pkg.version);
            process.exit(1);
          }
          console.log('Release identity verified:', versions);
          NODE

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Print safe npm diagnostics
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Registry: $(npm config get registry)"

      - name: Publish (Trusted Publishing via OIDC)
        # Uses npm Trusted Publishing (OIDC) - requires npm >= 11.5.1
        # The --provenance flag with id-token: write triggers OIDC authentication
        # DO NOT set NODE_AUTH_TOKEN - let npm use OIDC instead
        run: npm publish --provenance --access public
